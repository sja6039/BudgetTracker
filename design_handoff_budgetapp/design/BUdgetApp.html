<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>BUdgetApp — Hi-fi mockup</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #0a0a0c; }
  body { font-family: 'Inter', system-ui, sans-serif; color: #e8e8ea; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="screens/overview.jsx"></script>
  <script type="text/babel" src="screens/investments.jsx"></script>
  <script type="text/babel" src="screens/spending.jsx"></script>
  <script type="text/babel" src="screens/subscriptions.jsx"></script>
  <script type="text/babel" src="screens/budgets.jsx"></script>

  <script type="text/babel">
    const useState = React.useState;
    const useEffect = React.useEffect;

    const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
      "accent": "emerald",
      "density": "spacious",
      "chartStyle": "area"
    }/*EDITMODE-END*/;

    const ACCENTS = {
      emerald: 'oklch(0.74 0.14 155)',
      indigo:  'oklch(0.70 0.16 265)',
      amber:   'oklch(0.80 0.14 80)',
      rose:    'oklch(0.72 0.16 15)',
      cyan:    'oklch(0.78 0.12 210)',
    };

    const App = () => {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULS);

      const a = ACCENTS[tweaks.accent] || ACCENTS.emerald;
      const base = a.slice(0, -1);
      const accentVars = {
        '--accent': a,
        '--accent-soft': base + ' / 0.14)',
        '--accent-line': base + ' / 0.35)',
      };

      const screenProps = { density: tweaks.density, chartStyle: tweaks.chartStyle };

      // Guard: components attach to window asynchronously in some load orders.
      const ready = window.Overview && window.Investments && window.Spending && window.Subscriptions && window.Budgets;
      if (!ready) return <div style={{ color: '#888', padding: 40, fontFamily: 'Inter, system-ui' }}>Loading…</div>;

      return (
        <div style={accentVars}>
          <DesignCanvas title="BUdgetApp · Desktop · Hi-fi mockup">
            <DCSection id="dashboards" title="Core screens" subtitle="Static mockups · 1440 × 900">
              <DCArtboard id="overview"  label="01 · Overview"      width={1440} height={1100}><window.Overview {...screenProps}/></DCArtboard>
              <DCArtboard id="invest"    label="02 · Investments"   width={1440} height={1480}><window.Investments {...screenProps}/></DCArtboard>
              <DCArtboard id="spend"     label="03 · Spending"      width={1440} height={1640}><window.Spending {...screenProps}/></DCArtboard>
              <DCArtboard id="subs"      label="04 · Subscriptions" width={1440} height={1480}><window.Subscriptions {...screenProps}/></DCArtboard>
              <DCArtboard id="budgets"   label="05 · Budgets"       width={1440} height={1340}><window.Budgets {...screenProps}/></DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Accent color"/>
            <TweakRadio
              label="Accent"
              value={tweaks.accent}
              options={[
                { value: 'emerald', label: 'Emerald' },
                { value: 'indigo',  label: 'Indigo' },
                { value: 'amber',   label: 'Amber' },
                { value: 'rose',    label: 'Rose' },
                { value: 'cyan',    label: 'Cyan' },
              ]}
              onChange={v => setTweak('accent', v)}
            />
            <TweakSection label="Card density"/>
            <TweakRadio
              label="Density"
              value={tweaks.density}
              options={[
                { value: 'spacious', label: 'Spacious' },
                { value: 'compact',  label: 'Compact' },
              ]}
              onChange={v => setTweak('density', v)}
            />
            <TweakSection label="Chart style"/>
            <TweakRadio
              label="Style"
              value={tweaks.chartStyle}
              options={[
                { value: 'area',    label: 'Area' },
                { value: 'bar',     label: 'Bars' },
                { value: 'stepped', label: 'Stepped' },
              ]}
              onChange={v => setTweak('chartStyle', v)}
            />
          </TweaksPanel>
        </div>
      );
    };

    // Wait a tick to ensure all babel scripts have registered their globals.
    const mount = () => {
      if (window.Overview && window.Investments && window.Spending && window.Subscriptions && window.Budgets && window.DesignCanvas && window.useTweaks) {
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
      } else {
        setTimeout(mount, 30);
      }
    };
    mount();
  </script>
</body>
</html>
